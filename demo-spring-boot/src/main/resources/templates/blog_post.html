<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${viewModel.title} + ' - Fragments4k Demo'">Fragments4k Demo</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        h1, h2, h3 {
            color: #333;
        }
        .nav {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .nav a {
            margin-right: 15px;
            color: #0066cc;
            text-decoration: none;
        }
        .nav a:hover {
            text-decoration: underline;
        }
        .post-meta {
            color: #666;
            margin-bottom: 20px;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 5px;
        }
        .tag {
            display: inline-block;
            background: #007bff;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            margin-right: 5px;
            font-size: 0.9em;
        }
        .category {
            display: inline-block;
            background: #6c757d;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            margin-right: 5px;
            font-size: 0.9em;
        }
        .content {
            line-height: 1.8;
        }
        .content h2 {
            margin-top: 30px;
        }
        .content code {
            background: #f4f4f4;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
        }
        .content pre {
            background: #f4f4f4;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="/">Home</a>
        <a href="/blog">Blog</a>
    </nav>

    <article class="post">
        <h1 th:text="${viewModel.title}">Post Title</h1>

        <div class="post-meta">
            <p>
                <strong>Date:</strong> <span th:text="${viewModel.formattedDate}">2024-03-03</span><br>
                <div th:if="${viewModel.tags != null and !viewModel.tags.empty}">
                    <strong>Tags:</strong>
                    <span th:each="tag : ${viewModel.tags}" class="tag" th:text="${tag}">kotlin</span>
                    <br>
                </div>
                <div th:if="${viewModel.categories != null and !viewModel.categories.empty}">
                    <strong>Categories:</strong>
                    <span th:each="category : ${viewModel.categories}" class="category" th:text="${category}">tutorial</span>
                </div>
            </p>
        </div>

        <div class="content" th:utext="${viewModel.content}">
            <!-- Blog post content -->
        </div>
    </article>

    <footer>
        <p><a href="/blog">&larr; Back to blog</a></p>
        <p>&copy; 2024 Fragments4k. Powered by <a href="https://github.com/rygel/fragments4k">Fragments4k</a></p>
    </footer>
</body>
</html>
