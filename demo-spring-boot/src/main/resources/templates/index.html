<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fragments4k Demo</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        h1, h2, h3 {
            color: #333;
        }
        .nav {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .nav a {
            margin-right: 15px;
            color: #0066cc;
            text-decoration: none;
        }
        .nav a:hover {
            text-decoration: underline;
        }
        .search-box {
            margin-bottom: 30px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 5px;
        }
        .search-box input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .search-box button {
            margin-top: 10px;
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .search-box button:hover {
            background: #0056b3;
        }
        .fragment-list {
            list-style: none;
            padding: 0;
        }
        .fragment-list li {
            margin-bottom: 15px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 5px;
        }
        .fragment-title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .fragment-date {
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <nav class="nav">
        <a th:each="item : ${navigationMenu}"
           th:href="${item.url}"
           th:text="${item.label}">Home</a>
    </nav>

    <div class="search-box">
        <form action="/search" method="get">
            <input type="text" name="q" placeholder="Search articles..." th:value="${query}">
            <button type="submit">Search</button>
        </form>
    </div>

    <div th:if="${viewModel.fragments != null}">
        <ul class="fragment-list">
            <li th:each="fragment : ${viewModel.fragments}">
                <article class="fragment">
                    <h2 class="fragment-title" th:text="${fragment.title}">Fragment Title</h2>
                    <p class="fragment-date" th:text="${fragment.formattedDate}">2024-03-03</p>
                    <div class="fragment-content" th:utext="${fragment.contentPreview}">Content preview...</div>
                    <p><a th:href="'/' + ${fragment.slug}">Read more &rarr;</a></p>
                </article>
            </li>
        </ul>
    </div>

    <footer>
        <p>&copy; 2024 Fragments4k. Powered by <a href="https://github.com/rygel/fragments4k">Fragments4k</a></p>
    </footer>
</body>
</html>
