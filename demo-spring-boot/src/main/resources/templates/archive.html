<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="(${month} != null ? ${month} + '/' : '') + ${year} + ' Archive - Fragments4k Demo'">Archive - Fragments4k Demo</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        h1, h2 {
            color: #333;
        }
        .nav {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .nav a {
            margin-right: 15px;
            color: #0066cc;
            text-decoration: none;
        }
        .nav a:hover {
            text-decoration: underline;
        }
        .archive-header {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #007bff;
        }
        .archive-header h1 {
            margin: 0 0 10px 0;
        }
        .archive-count {
            color: #666;
            margin-bottom: 20px;
            font-style: italic;
        }
        .archive-breadcrumbs {
            margin-bottom: 20px;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 5px;
        }
        .archive-breadcrumbs a {
            color: #0066cc;
            text-decoration: none;
            margin: 0 5px;
        }
        .archive-breadcrumbs a.active {
            color: #333;
            font-weight: bold;
        }
        .archive-breadcrumbs a:hover {
            text-decoration: underline;
        }
        .archive-years, .archive-months {
            margin-bottom: 30px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 5px;
        }
        .archive-years h3, .archive-months h3 {
            margin-top: 0;
            margin-bottom: 10px;
            color: #333;
        }
        .archive-year-list, .archive-month-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .archive-year-list li, .archive-month-list li {
            display: inline;
        }
        .archive-year-list a, .archive-month-list a {
            color: #0066cc;
            text-decoration: none;
            padding: 5px 10px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 3px;
        }
        .archive-year-list a:hover, .archive-month-list a:hover {
            background: #007bff;
            color: white;
            border-color: #007bff;
        }
        .archive-year-list a.active, .archive-month-list a.active {
            background: #007bff;
            color: white;
            border-color: #007bff;
            font-weight: bold;
        }
        .archive-item {
            margin-bottom: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 5px;
            border-left: 4px solid #007bff;
        }
        .archive-title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .archive-title a {
            color: #0066cc;
            text-decoration: none;
        }
        .archive-title a:hover {
            text-decoration: underline;
        }
        .archive-date {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
        }
        .reading-time {
            color: #28a745;
            font-weight: bold;
        }
        .archive-preview {
            color: #555;
        }
        .no-posts {
            text-align: center;
            padding: 40px;
            background: #f8f9fa;
            border-radius: 8px;
            color: #666;
        }
    </style>
</head>
<body>
    <nav class="nav">
        <a th:each="item : ${viewModel.navigationMenu}"
           th:href="${item.url}"
           th:text="${item.label}">Home</a>
    </nav>

    <div class="archive-header">
        <h1>Archive: <span th:text="(${month} != null ? ${month} + '/' : '') + ${year}">2024</span></h1>
        <p class="archive-count">
            <span th:if="${fragments != null and !fragments.empty}">
                <span th:text="${fragments.size()}">5</span> <span th:text="${fragments.size() == 1} ? 'post' : 'posts'">posts</span> in this period
            </span>
            <span th:if="${fragments == null or fragments.empty}">No posts in this period</span>
        </p>
    </div>

    <div th:if="${fragments != null and !fragments.empty}">
    <article class="archive-item" th:each="fragment : ${fragments}">
        <h2 class="archive-title">
            <a th:href="@{/blog/{year}/{month}/{slug}(year=${fragment.year}, month=${fragment.month}, slug=${fragment.slug})}"
               th:text="${fragment.title}">Post Title</a>
        </h2>
        <p class="archive-date">
            <span th:text="${fragment.formattedDate}">2024-03-03</span>
            <span class="reading-time">&bull; <span th:text="${fragment.readingTime.text}">5m read</span></span>
        </p>
        <p class="archive-preview" th:text="${fragment.preview}">Content preview...</p>
    </article>
    </div>

    <div th:if="${fragments == null or fragments.empty}" class="no-posts">
        <h2>No posts found</h2>
        <p>There are no blog posts for this time period.</p>
    </div>

    <footer>
        <p><a href="/blog">&larr; Back to blog</a></p>
        <p>&copy; 2024 Fragments4k. Powered by <a href="https://github.com/rygel/fragments4k">Fragments4k</a></p>
    </footer>
</body>
</html>
