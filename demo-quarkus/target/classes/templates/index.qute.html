<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fragments4k Demo</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        h1, h2, h3 {
            color: #333;
        }
        .nav {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .nav a {
            margin-right: 15px;
            color: #0066cc;
            text-decoration: none;
        }
        .nav a:hover {
            text-decoration: underline;
        }
        .fragment-list {
            list-style: none;
            padding: 0;
        }
        .fragment-list li {
            margin-bottom: 15px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 5px;
        }
        .fragment-title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .fragment-date {
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="/">Home</a>
        <a href="/blog">Blog</a>
    </nav>

    <ul class="fragment-list">
        {#for fragment in viewModel.fragments}
        <li class="fragment">
            <h2 class="fragment-title">{fragment.title}</h2>
            <p class="fragment-date">{fragment.formattedDate}</p>
            <div class="fragment-content">{fragment.contentPreview:}</div>
            <p><a href="/page/{fragment.slug}">Read more &rarr;</a></p>
        </li>
        {/for}
    </ul>

    <footer>
        <p>&copy; 2024 Fragments4k. Powered by <a href="https://github.com/rygel/fragments4k">Fragments4k</a></p>
    </footer>
</body>
</html>
