build:
  maxIssues: 0

complexity:
  LongMethod:
    threshold: 60
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 12
  CyclomaticComplexMethod:
    threshold: 15
  TooManyFunctions:
    thresholdInFiles: 30
    thresholdInClasses: 30
  NestedBlockDepth:
    threshold: 5

style:
  MagicNumber:
    active: false
  ReturnCount:
    max: 5
  MaxLineLength:
    maxLineLength: 150
  WildcardImport:
    active: false
  ForbiddenComment:
    active: true

potential-bugs:
  active: true

performance:
  active: true

exceptions:
  active: true
  TooGenericExceptionCaught:
    active: true
