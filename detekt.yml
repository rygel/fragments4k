build:
  maxIssues: 0

complexity:
  LongMethod:
    threshold: 50
  LongParameterList:
    functionThreshold: 6
    constructorThreshold: 8
  CyclomaticComplexMethod:
    threshold: 15
  TooManyFunctions:
    thresholdInFiles: 15
    thresholdInClasses: 30
  NestedBlockDepth:
    threshold: 5

style:
  MagicNumber:
    active: false
  ReturnCount:
    max: 5
  MaxLineLength:
    maxLineLength: 140
  WildcardImport:
    active: true
  ForbiddenComment:
    active: true

potential-bugs:
  active: true

performance:
  active: true

exceptions:
  active: true
  TooGenericExceptionCaught:
    active: true
