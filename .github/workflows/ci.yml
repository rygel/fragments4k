name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean install -DskipTests

      - name: Run unit tests
        run: mvn test -pl fragments-core,fragments-static-core,fragments-blog-core,fragments-rss-core,fragments-lucene-core,fragments-http4k,fragments-javalin

  test-spring-boot:
    name: Test Spring Boot Adapter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test Spring Boot adapter
        run: mvn clean install -DskipTests && mvn test -pl fragments-spring-boot

  test-quarkus:
    name: Test Quarkus Adapter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test Quarkus adapter
        run: mvn clean install -DskipTests && mvn test -pl fragments-quarkus

  test-micronaut:
    name: Test Micronaut Adapter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test Micronaut adapter
        run: mvn clean install -DskipTests && mvn test -pl fragments-micronaut
