<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Search: ' + ${query} + ' - ' + ${siteTitle}">Search Results</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        h1, h2 {
            color: #333;
        }
        .nav {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .nav a {
            margin-right: 15px;
            color: #0066cc;
            text-decoration: none;
        }
        .nav a:hover {
            text-decoration: underline;
        }
        .search-box {
            margin-bottom: 30px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 5px;
        }
        .search-box input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .search-box button {
            margin-top: 10px;
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .search-box button:hover {
            background: #0056b3;
        }
        .results-count {
            color: #666;
            margin-bottom: 20px;
        }
        .result-item {
            margin-bottom: 30px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 5px;
            border-left: 4px solid #007bff;
        }
        .result-title {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .result-title a {
            color: #0066cc;
            text-decoration: none;
        }
        .result-title a:hover {
            text-decoration: underline;
        }
        .result-preview {
            color: #555;
            margin-bottom: 10px;
        }
        .result-meta {
            color: #777;
            font-size: 0.9em;
        }
        .tag {
            display: inline-block;
            background: #e9ecef;
            padding: 2px 8px;
            border-radius: 3px;
            margin-right: 5px;
            font-size: 0.85em;
        }
        .no-results {
            padding: 40px;
            text-align: center;
            color: #666;
            background: #f9f9f9;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="/">Home</a>
        <a href="/blog">Blog</a>
    </nav>

    <h1 th:text="'Search Results for &quot;' + ${query} + '&quot;'"></h1>

    <div class="search-box">
        <form action="/search" method="get">
            <input type="text" name="q" placeholder="Search articles..." th:value="${query}">
            <button type="submit">Search</button>
        </form>
    </div>

    <div th:if="${results != null and !results.isEmpty()}">
        <p class="results-count">
            Found <span th:text="${results.size()}"></span> 
            result<span th:if="${results.size() != 1}">s</span>
        </p>

        <article class="result-item" th:each="result : ${results}">
            <h2 class="result-title">
                <a th:if="${result.template == 'blog_post'}" 
                   th:href="'/blog/' + ${result.date[0]} + '/' + ${#strings.format('%02d', result.date[1])} + '/' + ${result.slug}"
                   th:text="${result.title}"></a>
                <a th:unless="${result.template == 'blog_post'}" 
                   th:href="'/page/' + ${result.slug}"
                   th:text="${result.title}"></a>
            </h2>
            <p class="result-preview" th:text="${result.preview}"></p>
            <p class="result-meta">
                <span th:if="${result.date != null}" th:text="${result.formattedDate}"></span>
                <span th:if="${result.tags != null and !result.tags.isEmpty()}">
                    • Tags: 
                    <span class="tag" th:each="tag : ${result.tags}" th:text="${tag}"></span>
                </span>
            </p>
        </article>
    </div>

    <div th:if="${results == null or results.isEmpty()}" class="no-results">
        <h2>No results found</h2>
        <p th:text="'We couldn\'t find any articles matching &quot;' + ${query} + '&quot;.'"></p>
        <p>Try:</p>
        <ul>
            <li>Checking your spelling</li>
            <li>Using different keywords</li>
            <li>Searching for a less specific term</li>
        </ul>
    </div>

    <footer>
        <p>&copy; 2024 Fragments4k. Powered by <a href="https://github.com/rygel/fragments4k">Fragments4k</a></p>
    </footer>
</body>
</html>
